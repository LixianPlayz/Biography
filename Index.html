<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pastel Math Lab</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <nav class="nav">
      <h2>Pastel <span>Math Lab</span></h2>
      <button onclick="showPage('home')">Home</button>
      <button onclick="showPage('sorting')">Sorting</button>
      <button onclick="showPage('graphing')">Graphing</button>
      <button onclick="showPage('geometry')">Geometry</button>
      <button onclick="showPage('probability')">Probability</button>
      <button onclick="showPage('patterns')">Patterns</button>
    </nav>

    <section id="home" class="screen active">
      <h1>Pastel <span>Math Lab</span></h1>
      <p>A dark themed math playground with multiple cool tools.</p>

      <div class="cards">
        <div onclick="showPage('sorting')" class="card">Sorting Visualizer</div>
        <div onclick="showPage('graphing')" class="card">Function Grapher</div>
        <div onclick="showPage('geometry')" class="card">Geometry Calculator</div>
        <div onclick="showPage('probability')" class="card">Probability Simulator</div>
        <div onclick="showPage('patterns')" class="card">Pattern Generator</div>
      </div>
    </section>

    <section id="sorting" class="screen">
      <h1>Sorting <span>Visualizer</span></h1>

      <div class="controls">
        <select id="sortType">
          <option value="bubble">Bubble Sort</option>
          <option value="selection">Selection Sort</option>
          <option value="insertion">Insertion Sort</option>
        </select>
        <button onclick="shuffleBars()">Shuffle</button>
        <button onclick="startSort()">Sort</button>
      </div>

      <div id="bars" class="bars"></div>
    </section>

    <section id="graphing" class="screen">
      <h1>Function <span>Grapher</span></h1>

      <div class="controls">
        <select id="graphType" onchange="drawGraph()">
          <option value="linear">Linear</option>
          <option value="quadratic">Quadratic</option>
          <option value="sine">Sine</option>
          <option value="absolute">Absolute Value</option>
        </select>

        <input id="a" type="number" value="1" step="0.1" oninput="drawGraph()" />
        <input id="b" type="number" value="0" step="0.1" oninput="drawGraph()" />
        <input id="c" type="number" value="0" step="0.1" oninput="drawGraph()" />
      </div>

      <canvas id="graphCanvas" width="900" height="500"></canvas>
    </section>

    <section id="geometry" class="screen">
      <h1>Geometry <span>Calculator</span></h1>

      <div class="controls">
        <select id="shape">
          <option value="circle">Circle</option>
          <option value="rectangle">Rectangle</option>
          <option value="triangle">Triangle</option>
        </select>

        <input id="num1" type="number" placeholder="Radius / Width / Base" />
        <input id="num2" type="number" placeholder="Height" />
        <button onclick="calculateGeometry()">Calculate</button>
      </div>

      <div id="geometryOutput" class="output"></div>
    </section>

    <section id="probability" class="screen">
      <h1>Probability <span>Simulator</span></h1>

      <div class="controls">
        <select id="simType">
          <option value="coin">Coin Flip</option>
          <option value="dice">Dice Roll</option>
        </select>

        <input id="trials" type="number" value="100" />
        <button onclick="runSimulation()">Run</button>
      </div>

      <div id="probabilityOutput" class="output"></div>
    </section>

    <section id="patterns" class="screen">
      <h1>Pattern <span>Generator</span></h1>

      <div class="controls">
        <select id="patternType">
          <option value="arithmetic">Arithmetic</option>
          <option value="geometric">Geometric</option>
          <option value="fibonacci">Fibonacci</option>
          <option value="squares">Squares</option>
          <option value="cubes">Cubes</option>
        </select>

        <input id="startNum" type="number" value="1" />
        <input id="stepNum" type="number" value="2" />
        <input id="amountNum" type="number" value="10" />
        <button onclick="generatePattern()">Generate</button>
      </div>

      <div id="patternOutput" class="output"></div>
    </section>
  </main>

  <script src="main.js"></script>
</body>
</html>
